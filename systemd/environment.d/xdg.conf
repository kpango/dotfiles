XDG_CONFIG_HOME=${HOME}/.config
XDG_DATA_HOME=${HOME}/.data

# Portal backend selection — xdg-desktop-portal-wlr activates only when this is set
XDG_CURRENT_DESKTOP=sway

# Force all Electron apps to use native Wayland (prevents mouse freeze on focus return)
ELECTRON_OZONE_PLATFORM_HINT=wayland
NIXOS_OZONE_WL=1

# NVIDIA: VAAPI via libva-nvidia-driver + OpenGL threading + shader cache
LIBVA_DRIVER_NAME=nvidia
__GL_THREADED_OPTIMIZATIONS=1
__GL_SHADER_DISK_CACHE=1
