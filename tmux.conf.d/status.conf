# ── Catppuccin Mocha palette ──────────────────────────────────────────────────
# base=#1e1e2e  surface0=#313244  surface1=#45475a  surface2=#585b70
# overlay0=#6c7086  text=#cdd6f4  subtext1=#bac2de
# blue=#89b4fa  mauve=#cba6f7  sky=#89dceb  green=#a6e3a1  yellow=#f9e2af

# ── Status bar layout ──────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# ── Left: [session] ▶ [#I.#P path] ▶ [ branch] ▶ ─────────────────────────
#   blue(#S) → surface0(pane+path) → surface1(branch)
#   Single "pane" call outputs the complete path+branch segment with embedded
#   colour codes and the separator glyph, avoiding 3 separate subprocess spawns.
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244,nobold]#{@pl_right}#[fg=#585b70,bg=#313244] #I.#P #($HOME/.zcache/tmux-pane-info pane #{pane_current_path})'
set -g status-left-length 200

# ── Right: CPU / RAM (±temp) ────────────────────────────────────────────────
if-shell "[ -f /.dockerenv ] && ! sensors > /dev/null 2>&1 && ! cat /sys/class/thermal/thermal_zone0/temp > /dev/null 2>&1" \
  'set -g  status-right "#[fg=#313244,bg=#1e1e2e]#{@pl_left}#[fg=#a6e3a1,bg=#313244] CPU: #{cpu_fg_color}#{cpu_percentage} #[fg=#89dceb]RAM: #{ram_fg_color}#{ram_percentage} "' \
  'set -g  status-right "#[fg=#313244,bg=#1e1e2e]#{@pl_left}#[fg=#a6e3a1,bg=#313244] CPU: #{cpu_fg_color}#{cpu_percentage} #{cpu_temp_fg_color}#{cpu_temp} #[fg=#89dceb]RAM: #{ram_fg_color}#{ram_percentage} "'

# ── Right: GPU segment (NVIDIA / AMD only) ──────────────────────────────────
if-shell "{ lspci 2>/dev/null | grep -E 'VGA|3D' | grep -qE 'NVIDIA|AMD'; } || timeout 3 nvidia-smi > /dev/null 2>&1 || timeout 3 rocm-smi > /dev/null 2>&1" \
  'set -ag status-right "#[fg=#cba6f7]GPU: #{gpu_fg_color}#{gpu_percentage} #{gpu_temp_fg_color}#{gpu_temp} #[fg=#f5c2e7]VRAM: #{gram_fg_color}#{gram_percentage} "'

# ── Right: time + kube ──────────────────────────────────────────────────────
if-shell "[ -f /.dockerenv ]" \
  'set -ag status-right "#($HOME/.zcache/tmux-pane-info kube green brightcyan) "' \
  'set -ag status-right "#[fg=#bac2de]%Y/%m/%d(%a) %H:%M:%S #($HOME/.zcache/tmux-pane-info kube green brightcyan) "'

set -g  status-right-length 180

# ── Window status ────────────────────────────────────────────────────────────
#   active: flat solid block, color = mauve (normal) / yellow (prefix)
#   inactive: dim text, no background
set -g window-status-current-format '#[fg=#{?client_prefix,#f9e2af,#cba6f7},bg=#1e1e2e,bold]#{@pl_left}#[fg=#1e1e2e,bg=#{?client_prefix,#f9e2af,#cba6f7},bold]#I:#W#[bg=#1e1e2e,fg=#{?client_prefix,#f9e2af,#cba6f7},bold]#{@pl_right}#[fg=#{?client_prefix,#f9e2af,#cba6f7},bg=#1e1e2e,nobold] '
set -g window-status-format '#[fg=#585b70,bg=#1e1e2e,nobold] #I:#W#F '
set -g window-status-separator ""
