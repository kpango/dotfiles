
# ── Status bar layout ──────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom
set -g status-style "bg=#{@cl_base},fg=#{@cl_text}"

# ── Left: [session] ▶ [#I.#P path] ▶ [branch] ▶ ──────────────────────────────
#   blue(#S) → surface0(pane) → surface1(path+branch)
set -g status-left '#[#{@seg_session},bold] #S#[#{@sep_session_pane},nobold]#{@pl_right}#[#{@seg_pane},nobold]#I.#P#[#{@sep_pane_path},nobold]#{@pl_right}#(#{@bin_pane_info} pane #{pane_current_path})'
set -g status-left-length 200

# ── Right segments (base → surface0 → surface1 → surface2 → overlay) ─────────
#   CPU/RAM(s0) → GPU/Disk(s0) → kube(s1) → date(s2) → time(overlay, host only)

# ── CPU / RAM: base → surface0 エントリー（Docker:temp無し / host:temp有り）──
if-shell "[ -f /.dockerenv ]" \
  'set -g  status-right "#[#{@sep_right_entry}]#{@pl_left}#[fg=#{@cl_green},bg=#{@cl_surface0}]CPU:#{cpu_fg_color}#{cpu_percentage} #[fg=#{@cl_blue}]RAM:#{ram_fg_color}#{ram_percentage} "' \
  'set -g  status-right "#[#{@sep_right_entry}]#{@pl_left}#[fg=#{@cl_green},bg=#{@cl_surface0}]CPU:#{cpu_fg_color}#{cpu_percentage} #{cpu_temp_fg_color}#{cpu_temp} #[fg=#{@cl_blue}]RAM:#{ram_fg_color}#{ram_percentage} "'

# ── GPU: surface0 継続（NVIDIA / AMD のみ）───────────────────────────────────
if-shell "{ lspci 2>/dev/null | grep -E 'VGA|3D' | grep -qE 'NVIDIA|AMD'; } || timeout 3 nvidia-smi > /dev/null 2>&1 || timeout 3 rocm-smi > /dev/null 2>&1" \
  'set -ag status-right "#[fg=#{@cl_purple}]GPU:#{gpu_fg_color}#{gpu_percentage} #{gpu_temp_fg_color}#{gpu_temp} #[fg=#{@cl_cyan}]VRAM:#{gram_fg_color}#{gram_percentage}"'

# ── Disk: surface0 継続（host only）─────────────────────────────────────────
if-shell '[ "$(cat /proc/1/comm 2>/dev/null)" = "systemd" ]' \
  'set -ag status-right " #[fg=#{@cl_yellow}]VOL:#(#{@bin_disk_info})'

# ── kube: surface0 → surface1（常に表示）────────────────────────────────────
set -ag status-right "#[#{@sep_right_kube}]#{@pl_left}#[bg=#{@cl_surface1}]#(#{@bin_pane_info} kube green brightcyan) "

# ── 時刻: surface1 → surface2(date) → overlay(time)（host only、最右端）───────
if-shell '[ "$(cat /proc/1/comm 2>/dev/null)" = "systemd" ]' \
  'set -ag status-right "#[#{@sep_right_date}]#{@pl_left}#[#{@seg_date}]%Y/%m/%d(%a)#[#{@sep_right_time}]#{@pl_left}#[#{@seg_time}]%H:%M:%S "'

set -g  status-right-length 180

# ── Window status ────────────────────────────────────────────────────────────
#   active: pill shape, green (normal) / red (prefix), black text
#   inactive: dim light-gray text on base bg
set -g window-status-style          "bg=#{@cl_base},fg=#{@cl_overlay},nobold"
set -g window-status-current-style  "bg=#{@cl_base},fg=#{@cl_green},bold"
set -g window-status-last-style     "bg=#{@cl_base},fg=#{@cl_overlay},nobold"
set -g window-status-activity-style "bg=#{@cl_base},fg=#{@cl_yellow},nobold"
set -g window-status-bell-style     "bg=#{@cl_base},fg=#{@cl_red},bold"
set -g window-status-current-format '#[fg=#{?client_prefix,#{@cl_red},#{@cl_green}},bg=#{@cl_base},bold]#{@pl_left}#[fg=#{@cl_surface0},bg=#{?client_prefix,#{@cl_red},#{@cl_green}},bold]#I:#W#[bg=#{@cl_base},fg=#{?client_prefix,#{@cl_red},#{@cl_green}},bold]#{@pl_right}#[fg=#{?client_prefix,#{@cl_red},#{@cl_green}},bg=#{@cl_base},nobold]'
set -g window-status-format        '#[fg=#{@cl_overlay},bg=#{@cl_base},nobold] #I:#W '
set -g window-status-separator     ""
