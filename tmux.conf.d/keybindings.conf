unbind l
unbind s

# ── Windows / panes ────────────────────────────────────────────────────────────
bind c new-window      -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'
bind-key -r a setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"

# ── Pane resize ────────────────────────────────────────────────────────────────
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-h resize-pane -L 5
bind-key -r C-l resize-pane -R 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-k resize-pane -U 5
bind-key -r M-h resize-pane -L 5
bind-key -r M-l resize-pane -R 5

# ── Pane navigation (vim-style) ────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Window navigation ──────────────────────────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n MouseDown1StatusLeft new-window

# ── Mouse wheel ────────────────────────────────────────────────────────────────
bind-key -n WheelUpPane if-shell -Ft= "#{?pane_in_mode,1,#{alternate_on}}" "send-keys -M" "copy-mode"

# ── Config reload ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf

# ── Copy mode ──────────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -i -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel -i --clipboard; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; else cat; fi"
bind-key p run "{ if command -v wl-paste >/dev/null 2>&1; then timeout 2 wl-paste --no-newline; elif command -v xclip >/dev/null 2>&1; then xclip -o -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel -o --clipboard; elif command -v pbpaste >/dev/null 2>&1; then pbpaste; fi 2>/dev/null || true; } | tmux load-buffer - ; tmux paste-buffer"
