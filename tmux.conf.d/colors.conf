# ── zed_kpango colour palette ─────────────────────────────────────────────────
# Single source of truth — sourced first in tmux.conf before all other configs.
# Reference via #{@cl_<name>} in any format string or style value.

# Surface levels (dark → mid → light)
set -g @cl_base     "#1f1f1f"
set -g @cl_surface0 "#282c33"
set -g @cl_surface1 "#2f343e"
set -g @cl_surface2 "#3b4048"
set -g @cl_overlay  "#5d636f"

# Text
set -g @cl_text    "#c8ccd4"
set -g @cl_subtext "#ebece6"

# Accents
set -g @cl_blue   "#73ade9"
set -g @cl_purple "#b477cf"
set -g @cl_green  "#a1c181"
set -g @cl_yellow "#dfc184"
set -g @cl_red    "#d07277"
set -g @cl_cyan   "#6eb4bf"
