# в”Ђв”Ђ Named fg/bg style pairs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Composed from colors.conf values. Cannot reference #{@cl_xxx} here because
# tmux does not recursively expand format variables вЂ” hex values are hardcoded.
# When changing a colour in colors.conf, update the affected pairs below too.
#
# Naming:
#   @seg_*  вЂ” segment text styles (fg=text_colour, bg=segment_bg)
#   @sep_*  вЂ” powerline separator styles (fg=source_bg, bg=dest_bg)

# в”Ђв”Ђ Status-left segments (left в†’ right, plRight в–¶) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g @seg_session        "fg=#282c33,bg=#73ade9"   # session pill  (surface0 on blue)
set -g @sep_session_pane   "fg=#73ade9,bg=#282c33"   # в–¶ blueв†’surface0
set -g @seg_pane           "fg=#5d636f,bg=#282c33"   # pane ID       (overlay on surface0)
set -g @sep_pane_path      "fg=#282c33,bg=#2f343e"   # в–¶ surface0в†’surface1

# в”Ђв”Ђ Status-right separators (right в†’ left, plLeft в—Ђ) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g @sep_right_entry    "fg=#282c33,bg=#1f1f1f"   # в—Ђ baseв†’surface0   (rightmost entry)
set -g @sep_right_kube     "fg=#2f343e,bg=#282c33"   # в—Ђ surface0в†’surface1  (kube)
set -g @sep_right_date     "fg=#3b4048,bg=#2f343e"   # в—Ђ surface1в†’surface2  (date)
set -g @sep_right_time     "fg=#5d636f,bg=#3b4048"   # в—Ђ surface2в†’overlay   (time)

# в”Ђв”Ђ Status-right segment text styles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g @seg_date           "fg=#c8ccd4,bg=#3b4048"   # date  (text on surface2)
set -g @seg_time           "fg=#ebece6,bg=#5d636f"   # time  (subtext on overlay)
