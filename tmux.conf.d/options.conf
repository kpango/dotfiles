# ── Prefix: C-b (Linux host), C-g (macOS host), C-w (Docker) ──────────────────
set -g prefix C-b
bind C-b send-prefix
if-shell 'uname | grep -q Darwin' \
  'set -g prefix C-g; unbind -q C-b; bind C-g send-prefix'
if-shell 'test -f /.dockerenv' \
  'set -g prefix C-w; unbind -q C-b; unbind -q C-g; bind C-w send-prefix'

# ── Window / pane indexing ─────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Window naming ──────────────────────────────────────────────────────────────
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set-option -g set-titles on

# ── Input / history ────────────────────────────────────────────────────────────
set -g status-keys vi
setw -g mode-keys vi
set -g history-limit 1000000
set -g mouse on
set -g focus-events on
set -sg escape-time 0

# ── Activity ───────────────────────────────────────────────────────────────────
setw -g monitor-activity on
setw -g visual-activity off
setw -g aggressive-resize on

# ── Terminal ───────────────────────────────────────────────────────────────────
if-shell 'test -f /.dockerenv' \
  'set -g default-terminal xterm-256color' \
  'set -g default-terminal tmux-256color'
set -gu terminal-features
set -g terminal-features[0] "xterm*:clipboard:ccolour:cstyle:focus:title:RGB:U8"
set -g terminal-features[3] "ghostty*:RGB:U8"
set -g terminal-features[4] "tmux*:RGB"
setw -g alternate-screen on
set -g default-command "${SHELL}"

# ── Pane borders ───────────────────────────────────────────────────────────────
set -g pane-border-lines "heavy"
set -g pane-border-status off
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ── Pane dimming (inactive panes are dimmed via fg only; no bg override) ──────
set -g window-style "fg=#6c7086"
set -g window-active-style "fg=#cdd6f4"

# ── Popup ──────────────────────────────────────────────────────────────────────
set -g popup-style "bg=#1e1e2e,fg=#cdd6f4"
set -g popup-border-style "fg=#89b4fa,bg=#1e1e2e"
set -g popup-border-lines "heavy"

# ── Powerline glyphs (vars avoid UTF-8 confusion in format string parser) ────────
set -g @pl_right ""
set -g @pl_left  ""

# ── Messages ───────────────────────────────────────────────────────────────────
set -g message-style "bg=#313244,fg=#f9e2af,bold"
set -g message-command-style "bg=#1e1e2e,fg=#89b4fa"

# ── Selection / copy mode ──────────────────────────────────────────────────────
set -g mode-style "bg=#45475a,fg=#cdd6f4,bold"

# ── Environment passthrough ────────────────────────────────────────────────────
set -g update-environment 'DISPLAY WAYLAND_DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY COLORTERM LANG LC_ALL LC_CTYPE KUBECONFIG XDG_DATA_HOME XDG_CONFIG_HOME XDG_CACHE_HOME'
set-environment -g LANG en_US.UTF-8
set-environment -g LC_ALL en_US.UTF-8
