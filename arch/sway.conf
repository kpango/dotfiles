# Sway configuration — kpango (Threadripper 3990X / RTX 2070 SUPER / Wayland)
# Read `man 5 sway` for a complete reference.

### Variables
set $mod Mod4
font HackGen35ConsoleNF Regular 16
floating_modifier $mod normal
focus_follows_mouse no
mouse_warping output
popup_during_fullscreen smart

set $lock swaylock -f -c 000000

# Vim-style direction keys
set $left h
set $down j
set $up k
set $right l

# Terminal: ghostty → tmux session
set $term env GTK_IM_MODULE= LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8 ghostty -e $SHELL -c "tmux -S /tmp/tmux.sock -q has-session && \
  exec tmux -S /tmp/tmux.sock -2 attach-session -d || \
  exec tmux -S /tmp/tmux.sock -2 new-session -n$USER -s$USER@$(hostname)"
set $xterm WINIT_UNIX_BACKEND=x11 ghostty -o font.size=5.5 -e $SHELL -c "tmux -S /tmp/tmux.sock -q has-session && \
  exec tmux -S /tmp/tmux.sock -2 attach-session -d || \
  exec tmux -S /tmp/tmux.sock -2 new-session -n$USER -s$USER@$(hostname)"
set $term-float ghostty

# Launchers & utilities
set $menu wofi --show drun --config $HOME/.config/wofi/config -i
set $chrome /usr/bin/google-chrome-beta
set $cheat $term-float -t cheatsheet -e micro ~/.config/sway/cheatsheet.md

### Output configuration
set $wallpapers_path $HOME/.wallpapers
exec_always --no-startup-id \
  bash -c 'swaybg -m fill -i "$(find -L $HOME/.wallpapers -type f \
     ! -path "*/.git/*" ! -name "Makefile" ! -name "*.go" ! -name "go.mod" \
     ! -name "go.sum" | shuf -n1)"'

output * scale 1.00

### Idle configuration
exec swayidle -w \
    timeout 300 "$lock" \
    timeout 600 "swaymsg \"output * dpms off\"" \
    resume "swaymsg \"output * dpms on\"" \
    before-sleep "$lock"

### Input configuration
input type:touchpad {
    tap enabled
    dwt enabled
    click_method clickfinger
    drag enabled
    natural_scroll enabled
    pointer_accel 0.8
}

input type:keyboard {
    xkb_options ctrl:nocaps
}

### Key bindings

# Terminals
bindsym $mod+Return exec --no-startup-id $term
bindsym $mod+Ctrl+Return exec --no-startup-id $xterm

# Kill window
bindsym $mod+Shift+q kill

# Application launchers
bindsym $mod+d exec --no-startup-id $menu

# DPMS on/off
bindsym $mod+Shift+Return exec --no-startup-id swaymsg "output * dpms on"
bindsym $mod+Shift+Delete exec --no-startup-id swaymsg "output * dpms off"

# Lock screen
bindsym $mod+Escape exec --no-startup-id $lock
bindsym $mod+F1 exec --no-startup-id ~/.config/sway/scripts/lockman.sh

# Cheatsheet
bindsym $mod+Shift+i exec $cheat

# Function key shortcuts
bindsym $mod+F2 exec --no-startup-id $chrome
bindsym $mod+F3 exec --no-startup-id slack
bindsym $mod+F4 exec --no-startup-id discord
bindsym $mod+F5 exec --no-startup-id $chrome --app=https://calendar.google.com/calendar/r
bindsym $mod+F6 exec --no-startup-id $chrome --app=https://mail.google.com/mail/u/0/#inbox
bindsym $mod+F7 exec --no-startup-id $chrome --app=https://github.com/kpango

# Sway management
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec --no-startup-id swaynag -t warning -m 'Exit sway? This will end your Wayland session.' -b 'Yes, exit sway' 'swaymsg exit'

# Focus movement
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Window movement
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Workspaces
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10
bindsym $mod+Shift+1 move container to workspace 1
bindsym $mod+Shift+2 move container to workspace 2
bindsym $mod+Shift+3 move container to workspace 3
bindsym $mod+Shift+4 move container to workspace 4
bindsym $mod+Shift+5 move container to workspace 5
bindsym $mod+Shift+6 move container to workspace 6
bindsym $mod+Shift+7 move container to workspace 7
bindsym $mod+Shift+8 move container to workspace 8
bindsym $mod+Shift+9 move container to workspace 9
bindsym $mod+Shift+0 move container to workspace 10

# Layout
bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+f exec ~/.config/sway/scripts/smart-fullscreen.sh
bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent

# Scratchpad
bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus scratchpad show

# Workspace navigation
bindsym $mod+Tab workspace back_and_forth
bindsym $mod+Page_Up workspace prev_on_output
bindsym $mod+Page_Down workspace next_on_output
bindsym $mod+u [urgent] focus
bindsym $mod+Ctrl+space floating toggle

# Resize mode
mode "resize" {
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

# Resize floating windows with mouse scroll
bindsym --whole-window --border $mod+button4 resize shrink height 5px or 5 ppt
bindsym --whole-window --border $mod+button5 resize grow height 5px or 5 ppt
bindsym --whole-window --border $mod+Shift+button4 resize shrink width 5px or 5 ppt
bindsym --whole-window --border $mod+Shift+button5 resize grow width 5px or 5 ppt

# Audio
bindsym XF86AudioRaiseVolume exec --no-startup-id amixer -q set Master 5%+ unmute; notify-send "Volume Increased"
bindsym XF86AudioLowerVolume exec --no-startup-id amixer -q set Master 5%- unmute; notify-send "Volume Decreased"
bindsym XF86AudioMute exec --no-startup-id amixer -q set Master toggle; notify-send "Mute Toggled"
bindsym XF86AudioPlay exec --no-startup-id playerctl play
bindsym XF86AudioPause exec --no-startup-id playerctl pause
bindsym XF86AudioNext exec --no-startup-id playerctl next
bindsym XF86AudioPrev exec --no-startup-id playerctl previous

# Brightness
bindsym XF86MonBrightnessUp exec --no-startup-id sudo light -A 5; notify-send "Brightness Increased"
bindsym XF86MonBrightnessDown exec --no-startup-id sudo light -U 5; notify-send "Brightness Decreased"

# Screenshots (grim + slurp)
bindsym print exec --no-startup-id grim "$HOME/Pictures/$(date +'%F-%T')-screenshot.png"
bindsym Shift+print exec --no-startup-id ~/.config/sway/scripts/screenshot.sh
bindsym $mod+Shift+p exec --no-startup-id grim -g "$(slurp)" "$HOME/Pictures/$(date +'%F-%T')-screenshot.png"

### Window rules

# Media
for_window [class="Gimp"] floating enable, resize set 800 600
for_window [class="mpv|Vlc"] floating enable, border normal
for_window [class="mpv"] floating enable

# System dialogs
for_window [app_id="pavucontrol"] floating enable, resize set width 40 ppt height 30 ppt
for_window [title="nmtui"] floating enable, resize set width 50 ppt height 70 ppt
for_window [title="btop"] floating enable, resize set width 50 ppt height 70 ppt

# Sticky floating
for_window [title="Picture in picture"] floating enable, sticky enable
for_window [title="File Operation Progress"] floating enable, border pixel 1, sticky enable, resize set width 40 ppt height 30 ppt

# Generic dialogs
for_window [title="Save File"] floating enable
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_role="Preferences"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_type="menu"] floating enable
for_window [window_role="About"] floating enable
for_window [class="fcitx-config-gtk3"] floating enable
for_window [class="fcitx-configtool"] floating enable

# Inhibit idle when fullscreen
for_window [app_id="com.mitchellh.ghostty"] inhibit_idle fullscreen
for_window [class="Google-chrome"] inhibit_idle fullscreen

# Title format
for_window [shell="xdg_shell"] title_format "%title (%app_id)"
for_window [shell="x_wayland"] title_format "%class - %title"

# Opacity
set $opacity 0.9
for_window [class="Ghostty|Google-chrome|Slack|discord|mpv"] opacity $opacity
for_window [app_id="com.mitchellh.ghostty"] opacity $opacity

### Status bar
bar {
    position top
    swaybar_command waybar
}

### Visual
default_border none
smart_borders on
hide_edge_borders --i3 smart
titlebar_border_thickness 0

gaps inner 8
gaps outer 2
smart_gaps on
bindsym $mod+z          gaps outer current plus 2
bindsym $mod+Shift+z    gaps outer current minus 2

# Window colors (Nord)
client.focused          #88c0d0 #434c5e #eceff4 #8fbcbb   #88c0d0
client.focused_inactive #88c0d0 #2e3440 #d8dee9 #4c566a   #4c566a
client.unfocused        #88c0d0 #2e3440 #d8dee9 #4c566a   #4c566a
client.urgent           #ebcb8b #ebcb8b #2e3440 #8fbcbb   #ebcb8b

### Autostart
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway DISPLAY SWAYSOCK
exec --no-startup-id mako
exec --no-startup-id kanshi
exec --no-startup-id fcitx5 -rd
exec_always --no-startup-id ~/.config/sway/scripts/import-gsettings
exec --no-startup-id swaymsg "workspace 1; exec $term"
exec systemctl --user start --no-block xdg-desktop-portal
