# SSH via Tailscale only
# ListenAddress is set dynamically by tailscale/setup.sh via:
#   tailscale ip -4 > /etc/ssh/sshd_config.d/11-tailscale-addr.conf
# This file contains only algorithm/policy settings (safe to publish).

# ── Host keys ──────────────────────────────────────────────────────────────────
HostKeyAlgorithms ssh-ed25519

# ── Key exchange ───────────────────────────────────────────────────────────────
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org

# ── Ciphers (AEAD only) ────────────────────────────────────────────────────────
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com

# ── MACs (ETM only) ────────────────────────────────────────────────────────────
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# ── Authentication ─────────────────────────────────────────────────────────────
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
PasswordAuthentication no
ChallengeResponseAuthentication no
PermitRootLogin no

# ── Connection health (critical for mobile clients like iPad) ──────────────────
ClientAliveInterval 30
ClientAliveCountMax 6

# ── Limits ────────────────────────────────────────────────────────────────────
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 10

# ── Disabled features ─────────────────────────────────────────────────────────
X11Forwarding no
AllowTcpForwarding yes
