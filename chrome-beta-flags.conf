# Chrome Beta — RTX 2070 SUPER + Threadripper 3990X (252GB RAM) + high-bandwidth
# dotfiles-managed: dotfiles/chrome-beta-flags.conf -> ~/.config/chrome-beta-flags.conf

# ── Wayland ───────────────────────────────────────────────────────────────
--ozone-platform=wayland
--enable-wayland-ime
--gtk-version=4

# ── GPU / Rendering (RTX 2070 SUPER, ANGLE + Vulkan) ─────────────────────
--use-gl=angle
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy
--num-raster-threads=4

# ── Features (Vulkan rendering / GPU decode / canvas / network) ───────────
--enable-features=VaapiVideoDecodeLinuxGL,VaapiVideoEncoder,AcceleratedVideoDecodeLinuxGL,CanvasOopRasterization,ParallelDownloading

# ── Memory (252GB RAM — keep background tabs alive, expand V8 heap) ───────
--js-flags=--max-old-space-size=8192
--disk-cache-size=1073741824
--renderer-process-limit=50
--max-tiles-for-interest-area=512
--disable-features=HighEfficiencyModeAvailable

# ── Network (high-bandwidth / QUIC / HTTP3) ───────────────────────────────
--enable-quic
--enable-tcp-fast-open
